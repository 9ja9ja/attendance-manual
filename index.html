<html lang="ko">
<head>

  <link href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117; --bg2: #161b22; --bg3: #1c2129; --border: #30363d;
      --text: #e6edf3; --text2: #8b949e; --text3: #6e7681;
      --blue: #58a6ff; --green: #3fb950; --orange: #d29922; --red: #f85149;
      --purple: #bc8cff; --teal: #39d9c1; --pink: #f778ba; --coral: #ea8a5e; --cyan: #56d4dd;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column;
    }

    /* Topbar */
    .topbar {
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: 0.85rem 1.5rem; display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    .topbar-logo {
      width: 32px; height: 32px; background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; font-weight: 800; color: #fff; flex-shrink: 0;
    }
    .topbar-title { font-size: 1.05rem; font-weight: 700; }
    .topbar-ver { font-size: 0.72rem; color: var(--text3); margin-left: auto; }

    .layout { display: flex; flex: 1; overflow: hidden; }

    /* Sidebar */
    .sidebar {
      width: 220px; background: var(--bg2); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; padding: 0.75rem 0;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 14px; margin: 2px 8px;
      border-radius: 8px; cursor: pointer; transition: all 0.15s; border: none; background: none;
      width: calc(100% - 16px); text-align: left; font-family: inherit; color: var(--text2); font-size: 0.88rem;
    }
    .nav-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .nav-item.active { background: rgba(88,166,255,0.1); color: var(--blue); }
    .nav-icon {
      width: 30px; height: 30px; border-radius: 7px; display: flex; align-items: center;
      justify-content: center; font-size: 0.7rem; font-weight: 700; flex-shrink: 0; border: 1px solid;
    }
    .nav-label { flex: 1; font-weight: 600; font-size: 0.85rem; }
    .nav-badge { font-size: 0.6rem; font-weight: 600; padding: 2px 6px; border-radius: 5px; }
    .nav-badge.count { background: rgba(139,148,158,0.12); color: var(--text3); }

    .nav-item[data-section="overview"] .nav-icon { background: rgba(88,166,255,0.1); color: var(--blue); border-color: rgba(88,166,255,0.25); }
    .nav-item[data-section="work-base"] .nav-icon { background: rgba(63,185,80,0.1); color: var(--green); border-color: rgba(63,185,80,0.25); }
    .nav-item[data-section="work-type"] .nav-icon { background: rgba(86,212,221,0.1); color: var(--cyan); border-color: rgba(86,212,221,0.25); }
    .nav-item[data-section="operation"] .nav-icon { background: rgba(234,138,94,0.1); color: var(--coral); border-color: rgba(234,138,94,0.25); }
    .nav-item[data-section="leave"] .nav-icon { background: rgba(247,120,186,0.1); color: var(--pink); border-color: rgba(247,120,186,0.25); }
    .nav-item[data-section="closing"] .nav-icon { background: rgba(210,153,34,0.1); color: var(--orange); border-color: rgba(210,153,34,0.25); }
    .nav-item[data-section="recognized"] .nav-icon { background: rgba(57,217,193,0.1); color: var(--teal); border-color: rgba(57,217,193,0.25); }
    .nav-item[data-section="reference"] .nav-icon { background: rgba(188,140,255,0.1); color: var(--purple); border-color: rgba(188,140,255,0.25); }

    .sidebar-bottom {
      margin-top: auto; padding: 12px 14px; border-top: 1px solid var(--border);
      font-size: 0.72rem; color: var(--text3); line-height: 1.6;
    }
    .sidebar-bottom a { color: var(--blue); text-decoration: none; font-weight: 600; }

    /* Main */
    .main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

    /* Subtab bar */
    .subtab-bar {
      background: var(--bg3); border-bottom: 1px solid var(--border); padding: 0 0.75rem;
      display: none; gap: 0; overflow-x: auto; scrollbar-width: none; flex-shrink: 0;
    }
    .subtab-bar::-webkit-scrollbar { display: none; }
    .subtab-bar.visible { display: flex; }
    .subtab-btn {
      padding: 9px 14px; font-size: 0.78rem; font-weight: 500; color: var(--text3);
      background: none; border: none; border-bottom: 2px solid transparent;
      cursor: pointer; white-space: nowrap; transition: all 0.15s; font-family: inherit;
    }
    .subtab-btn:hover { color: var(--text2); }
    .subtab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }

    /* Viewer top */
    .viewer-top {
      display: flex; justify-content: space-between; align-items: center; gap: 18px;
      padding: 8px 20px; border-bottom: 1px solid var(--border); background: var(--bg2); flex-shrink: 0;
    }
    .viewer-top h3 { margin: 0; font-size: 0.92rem; }
    .viewer-top p { margin: 2px 0 0; color: var(--text2); font-size: 0.75rem; }
    .viewer-actions a {
      padding: 5px 10px; border-radius: 6px; text-decoration: none;
      border: 1px solid var(--border); background: var(--bg3);
      font-size: 0.75rem; color: var(--text2); white-space: nowrap; transition: all .15s;
    }
    .viewer-actions a:hover { color: var(--text); border-color: var(--blue); }

    /* Content */
    .content-area { flex: 1; overflow: hidden; position: relative; }
    .sec-panel { display: none; position: absolute; inset: 0; overflow: hidden; }
    .sec-panel.active { display: block; }
    .sub-panel { display: none; position: absolute; inset: 0; overflow: hidden; }
    .sub-panel.active { display: block; }
    .sub-panel iframe { width: 100%; height: 100%; border: none; }
    .single-iframe { position: absolute; inset: 0; }
    .single-iframe iframe { width: 100%; height: 100%; border: none; }

    @media (max-width: 768px) {
      .sidebar { width: 52px; }
      .nav-label, .nav-badge, .sidebar-bottom { display: none; }
      .nav-item { padding: 10px 0; justify-content: center; margin: 2px 4px; width: calc(100% - 8px); }
    }
  </style>
</head>

          <div class="sub-panel" id="sub-r-출장외근"><iframe data-src="출장외근_인정시간_계산표.html" title="출장·외근 계산표"></iframe></div>
          <div class="sub-panel" id="sub-r-월마감"><iframe data-src="인정근로시간_월마감.html" title="월마감"></iframe></div>

        <!-- 6. 마감정산 -->
        <div class="sec-panel" id="sec-closing">
          <div class="sub-panel active" id="sub-c-집계마감"><iframe data-src="근태결과집계_마감.html" title="결과집계·마감"></iframe></div>
          <div class="sub-panel" id="sub-c-집계현황"><iframe data-src="근태결과집계현황.html" title="결과집계 현황"></iframe></div>
        </div>

        <!-- 6. 참고자료 (단일 iframe) -->
        <div class="sec-panel" id="sec-reference">
          <div class="single-iframe"><iframe data-src="용어집.html" title="용어집"></iframe></div>

    </div>
  </div>

  <script>

    const descriptions = {

      "외근유형관리.html": "외근 구분, 인정 단위, 출퇴근 인정, 근무시간 자동 인정, 휴일·연장 인정을 설정합니다.",
      "출장유형관리.html": "출장 구분, 인정 단위(일자/기간), 근무 인정 시간, 휴일 출장 인정을 설정합니다.",
      "연장근무유형관리.html": "연장·야간·휴일 근무 유형별 근무 시간(from~to), 휴게 시간, 인정 여부를 설정합니다.",
      "간주근무유형관리.html": "사업장 밖 근로 시 소정근무시간을 근무한 것으로 인정하는 간주근무 유형을 등록합니다.",
      "휴가_기본설정.html": "마이너스 연차, 자동부여, 생성기준, 비례휴가, 근속연수별 부여, 자동이월을 설정합니다.",
      "휴가유형설정.html": "연차·경조·출산육아·기타 휴가의 유무급, 차감방식, 유효기간을 등록합니다.",
      "출장외근유형관리.html": "출장과 외근 유형 설정의 통합 요약 문서입니다.",
      "직원근태.html": "직원 화면에 노출되는 값과 그 의미를 설명합니다.",
      "근태요청관리.html": "근로제 수정, 출퇴근 시간 수정, 근태 수정 요청과 승인·거절 흐름을 다룹니다.",
      "근태이력관리.html": "근태 관리에서 발생한 모든 변경 이력을 기간·기능·처리자·대상자 기준으로 조회합니다.",
      "나의근태현황.html": "직원이 근로정보를 조회하고 출퇴근을 등록하며, 주간/월간 근무시간과 근태 신청 내역을 확인합니다.",
      "근태스케줄.html": "월별 캘린더에서 근무일/휴일 스케줄을 확인하고 직접 근태를 신청합니다.",
      "근태기록조회.html": "출퇴근 시간, 근태 신청, 휴가 신청, 근무 시간 4개 조회 화면을 정리합니다.",
      "휴가관리.html": "휴가 차감과 유효기간, 유/무급 속성이 월마감에 어떻게 연결되는지 설명합니다.",
      "휴가부여조정.html": "직원별 연차 발생·사용·잔여 현황 조회, 수동 부여/소진 조정, 엑셀 일괄 업로드를 처리합니다.",
      "휴가배포이력.html": "귀속년도 기준 직원별 연차의 부여·소진 이력을 부여연차/소진연차 뷰로 조회합니다.",
      "월별연차현황.html": "직원별 연차 부여·소진·잔여·사용률과 월별 사용 내역을 조회합니다.",
      "연차촉진관리.html": "근로기준법 제61조에 따른 1차·2차 사용촉진 통보를 발송하고 회신 상태를 추적합니다.",
      "연차촉진현황.html": "촉진 진행 단계별 현황을 모니터링하고, 직원별 연차계획 회신 내역을 조회합니다.",
      "휴가이월정산.html": "잔여 유급연차를 정산 처리하고, 급여반영월에 연동하여 연차수당을 확정합니다.",
      "인정근로시간_통합로직.html": "기준 설정부터 일별 판정, 월마감, 급여 반영까지 전체 흐름을 한 장으로 정리한 별첨입니다.",
      "인정근로시간_우선순위_충돌규칙_보완안.html": "입력원천 우선순위, 충돌 규칙, 원래 문서 대비 보완 포인트를 상세하게 설명합니다.",
      "정상연장휴일_인정시간_계산표.html": "자동 등록과 실시간 등록, 연장 인정 방식, 지각·조퇴 유예, 결근과 휴게를 포함한 정상·연장·휴일 계산표를 정리합니다.",
      "출장외근_인정시간_계산표.html": "출장·외근 유형 설정에 따라 근무시간기준, 신청시간기준, 연장·야간·휴일 인정 여부가 어떻게 계산되는지 표로 정리합니다.",
      "인정근로시간_월마감.html": "일별 판정부터 월 집계, 급여 반영 자료까지 전체 계산 흐름을 설명합니다.",
      "근태결과집계_마감.html": "귀속월 기준 근태 데이터를 집계하고 마감 처리하며, 급여 연동 기준 데이터를 생성합니다.",
      "근태결과집계현황.html": "마감된 근태 데이터를 직원별 평일·휴일·근태항목별로 상세 조회합니다.",
      "용어집.html": "소정근로시간, 주휴일, 간주근로 등 근태관리 전문 용어를 카테고리별로 정리한 참고 문서입니다."
    };

    // Section names for default descriptions
    const sectionDesc = {
      overview: { title: "근태관리 개요", desc: "전체 업무 구조와 문서 읽는 순서를 안내합니다.", src: "근태관리_개요.html" },
      reference: { title: "용어집", desc: "근태관리 전문 용어를 카테고리별로 정리한 참고 문서입니다.", src: "용어집.html" }
    };

    function updateViewer(title, src) {
      viewerTitle.textContent = title;
      viewerDesc.textContent = descriptions[src] || "";
      openPage.href = src;
    }

    // Nav click → section switch
    navItems.forEach(item => {
      item.addEventListener('click', () => {
        const section = item.dataset.section;
        navItems.forEach(n => n.classList.remove('active'));
        item.classList.add('active');
        secPanels.forEach(p => p.classList.remove('active'));
        document.getElementById('sec-' + section).classList.add('active');

        // Subtab bars
        subtabBars.forEach(bar => bar.classList.toggle('visible', bar.dataset.for === section));

        // For single-iframe sections (overview, reference)
        if (sectionDesc[section]) {
          const sd = sectionDesc[section];
          updateViewer(sd.title, sd.src);
          // Lazy-load single iframe
          const panel = document.getElementById('sec-' + section);
          const iframe = panel.querySelector('iframe[data-src]');
          if (iframe) { iframe.src = iframe.dataset.src; iframe.removeAttribute('data-src'); }
        } else {
          // For tabbed sections, show the active subtab's info
          const bar = document.querySelector('.subtab-bar[data-for="' + section + '"]');
          if (bar) {
            const activeBtn = bar.querySelector('.subtab-btn.active');
            if (activeBtn) {
              updateViewer(activeBtn.dataset.title, activeBtn.dataset.src);
              // Lazy-load active sub-panel iframe
              const subId = 'sub-' + activeBtn.dataset.sub;
              const iframe = document.getElementById(subId)?.querySelector('iframe[data-src]');
              if (iframe) { iframe.src = iframe.dataset.src; iframe.removeAttribute('data-src'); }
            }
          }
        }
      });
    });

    // Subtab click → sub-panel switch
    subtabBars.forEach(bar => {
      const sectionName = bar.dataset.for;
      const secPanel = document.getElementById('sec-' + sectionName);
      const btns = bar.querySelectorAll('.subtab-btn');
      const panels = secPanel ? secPanel.querySelectorAll(':scope > .sub-panel') : [];

      btns.forEach(btn => {
        btn.addEventListener('click', () => {
          btns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          panels.forEach(p => p.classList.remove('active'));
          const panel = document.getElementById('sub-' + btn.dataset.sub);
          if (panel) {
            panel.classList.add('active');
            const iframe = panel.querySelector('iframe[data-src]');
            if (iframe) { iframe.src = iframe.dataset.src; iframe.removeAttribute('data-src'); }
          }
          updateViewer(btn.dataset.title, btn.dataset.src);
        });
      });
    });
  </script>
</body>
</html>
